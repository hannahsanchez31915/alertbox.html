<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prxttysiren Alerts</title>

<style>

body{
margin:0;
background:transparent;
font-family:"Trebuchet MS",sans-serif;
overflow:hidden;
}

/* ALERT BOX */

.alert{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%) scale(.8);
background:#ffd9ea;
border-radius:25px;
padding:18px 35px;
border:2px solid white;
box-shadow:0 0 25px rgba(255,120,180,.5);
font-size:26px;
font-weight:900;
color:#ff4f98;
opacity:0;
transition:all .5s ease;
}

.alert.show{
opacity:1;
transform:translateX(-50%) scale(1);
}

</style>
</head>

<body>

<div class="alert" id="alertBox">
<span id="alertText">Alert</span>
</div>

<script>

/* SHOW ALERT */

function showAlert(text){

const alert = document.getElementById("alertBox")
const alertText = document.getElementById("alertText")

alertText.innerText = text

alert.classList.add("show")

setTimeout(()=>{
alert.classList.remove("show")
},5000)

}

/* CONNECT TO TIKFINITY */

const socket = new WebSocket("ws://localhost:21213/")

socket.onopen = ()=>{
console.log("Connected to TikFinity")
}

socket.onmessage = (event)=>{

let msg = JSON.parse(event.data)

console.log(msg)

if(msg.event === "follow"){
showAlert(msg.data.nickname + " followed 💗")
}

if(msg.event === "gift"){
showAlert(msg.data.nickname + " sent " + msg.data.giftName + " 🎁")
}

}

/* TEST COMMANDS */

window.testFollow = ()=>{
showAlert("New follower: ShawtyFan 💗")
}

window.testGift = ()=>{
showAlert("ShawtyFan sent Rose x3 🎁")
}

</script>

</body>
</html>
