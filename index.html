<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prxttysiren Alert</title>

<style>

:root{
--pink1:#ffd9ea;
--pink2:#ffc3de;
--pink3:#ff7ab6;
--pink4:#ff4f98;
}

body{
margin:0;
background:transparent;
font-family:"Trebuchet MS",sans-serif;
overflow:hidden;
}

/* ALERT CONTAINER */

.alert{

position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%) scale(.8);

background:linear-gradient(180deg,var(--pink1),var(--pink2));

border-radius:25px;

padding:18px 30px;

border:2px solid white;

box-shadow:0 0 20px rgba(255,140,200,.4);

font-size:24px;
font-weight:900;

color:var(--pink4);

opacity:0;

transition:all .5s ease;

}

/* SHOW ALERT */

.alert.show{

opacity:1;
transform:translateX(-50%) scale(1);

}

/* HEART SPARKLES */

.sparkles{

position:absolute;
top:-10px;
left:0;
right:0;
text-align:center;
font-size:22px;
opacity:.7;

animation:sparkle 1.2s infinite;

}

@keyframes sparkle{

0%{opacity:.2}
50%{opacity:1}
100%{opacity:.2}

}

</style>
</head>

<body>

<div class="alert" id="alertBox">

<div class="sparkles">✨💗✨</div>

<span id="alertText">Alert</span>

</div>

<script>

/* SHOW ALERT */

function showAlert(text){

const alert = document.getElementById("alertBox")
const alertText = document.getElementById("alertText")

alertText.innerText = text

alert.classList.add("show")

setTimeout(()=>{
alert.classList.remove("show")
},5000)

}

<script>

/* TEST FUNCTIONS */

window.testFollow = function(){
showAlert("New follower: ShawtyFan 💗")
}

window.testGift = function(){
showAlert("ShawtyFan sent Rose x3 🎁")
}

/* TOP GIFTER UPDATE */

setInterval(()=>{

let name = localStorage.getItem("topgifter")
let count = localStorage.getItem("topgiftcount")

if(name){

document.getElementById("gifterName").innerText = name
document.getElementById("gifterCount").innerText = count

}

},1000)

</script>

</body>
</html>
